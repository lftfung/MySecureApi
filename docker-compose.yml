version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: my_finance_db_container
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password_here 
      POSTGRES_DB: MySecureApiDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: